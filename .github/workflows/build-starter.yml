name: Build Starter Snapshot

# Builds and uploads a community starter index snapshot.
# Triggered manually or on schedule (weekly).
# The snapshot is attached to the latest GitHub Release.

on:
  workflow_dispatch:
    inputs:
      seed_category:
        description: "Seed category: quickstart, tech-docs, academic, encyclopedia"
        default: "quickstart"
        required: false
      max_pages:
        description: "Maximum pages to crawl"
        default: "1000"
        required: false
  schedule:
    # Every Sunday at 03:00 UTC
    - cron: "0 3 * * 0"

concurrency:
  group: starter-snapshot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Crawl seed URLs
        env:
          SEED: ${{ github.event.inputs.seed_category || 'quickstart' }}
          MAX_PAGES: ${{ github.event.inputs.max_pages || '1000' }}
        run: |
          echo "Crawling seed category: $SEED (max $MAX_PAGES pages)"
          uv run python -c "
          import asyncio
          from infomesh.config import load_config
          from infomesh.services import AppContext
          from infomesh.crawler.crawl_loop import run_crawl_pass

          async def main():
              config = load_config()
              ctx = AppContext(config)
              try:
                  await run_crawl_pass(ctx, seeds='${SEED}', max_pages=int('${MAX_PAGES}'))
              finally:
                  ctx.close()

          asyncio.run(main())
          " || echo "Crawl completed (some errors may be expected)"

      - name: Export snapshot
        run: |
          uv run infomesh index export starter.infomesh-snapshot
          ls -lh starter.infomesh-snapshot
          uv run infomesh index stats

      - name: Find latest release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest release: $TAG"

      - name: Upload snapshot to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No release found, creating one..."
            TAG="starter-$(date +%Y%m%d)"
            gh release create "$TAG" \
              --title "Starter Index $TAG" \
              --notes "Community starter index snapshot (auto-generated)" \
              starter.infomesh-snapshot
          else
            # Delete old asset if exists, then upload new one
            gh release delete-asset "$TAG" starter.infomesh-snapshot 2>/dev/null || true
            gh release upload "$TAG" starter.infomesh-snapshot --clobber
            echo "Uploaded starter.infomesh-snapshot to release $TAG"
          fi
